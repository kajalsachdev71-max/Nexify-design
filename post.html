<script>
document.addEventListener('DOMContentLoaded', function () {
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('slug');
  if (!slug || !window.POSTS || !window.POSTS[slug]) {
    document.getElementById('postTitle').textContent = 'Article not found';
    document.getElementById('postBody').innerHTML = '<p style="color:var(--text-secondary);">This article does not exist. <a href="/blog.html" style="color:var(--blue);">Browse all articles →</a></p>';
    return;
  }
  const post = window.POSTS[slug];
  document.title = (post.seo_title || post.title) + ' | Nexify Design';
  const metaDesc = document.getElementById('pageDesc');
  if (metaDesc) metaDesc.setAttribute('content', post.seo_description || post.excerpt || '');
  document.getElementById('postCategory').textContent = post.category || 'Insights';
  document.getElementById('postTitle').textContent = post.title;
  document.getElementById('postDate').textContent = '📅 ' + (post.date || '');
  document.getElementById('postAuthor').textContent = '✍️ ' + (post.author || 'Nexify Design');
  document.getElementById('postReadTime').textContent = '⏱️ ' + (post.readTime || '5 min read');
  document.getElementById('pageTitle').textContent = (post.seo_title || post.title) + ' | Nexify Design';
  // Render markdown-like content
  const bodyEl = document.getElementById('postBody');
  if (bodyEl && post.body) {
    bodyEl.innerHTML = renderContent(post.body) + ctaBlock();
  }
});

function renderContent(text) {
  return text
    .replace(/^## (.+)$/gm, '<h2></h2>')
    .replace(/^### (.+)$/gm, '<h3></h3>')
    .replace(/\*\*(.+?)\*\*/g, '<strong></strong>')
    .replace(/\*(.+?)\*/g, '<em></em>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href=""></a>')
    .replace(/^- (.+)$/gm, '<li></li>')
    .replace(/(<li>.*<\/li>\n?)+/gs, function(m){ return '<ul>' + m + '</ul>'; })
    .replace(/\n\n/g, '</p><p>')
    .replace(/^(?!<[hul])/gm, '')
    .replace(/^(.+)$/gm, function(line){
      if(line.startsWith('<')) return line;
      return '<p>' + line + '</p>';
    });
}

function ctaBlock() {
  return '<div class="post-cta"><h3>Ready to Apply This to Your Business?</h3><p>Book a free 30-minute strategy call with the Nexify Design team. No obligation, just clarity.</p><a href="/index.html#contact" class="btn-primary">Get Free Consultation</a></div>';
}
</script>
